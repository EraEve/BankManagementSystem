<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>银行智能管理系统 v3.3 | 第十组</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
<style>
:root{--bank-blue:#0d6efd;--bank-deep:#084298;--bank-light:#eef5ff;--soft-gray:#f5f7fb;--text-main:#1f2937}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(135deg,#eef5ff 0%,#f8fbff 45%,#e8f1ff 100%);color:var(--text-main)}
.hidden{display:none!important}
.login-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:480px;border:none;border-radius:24px;overflow:hidden;box-shadow:0 18px 45px rgba(13,110,253,0.18)}
.login-header{padding:28px 28px 18px;background:linear-gradient(135deg,#0d6efd,#084298);color:#fff}
.login-header .brand-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(255,255,255,0.18);margin-bottom:12px}
.login-body{background:#fff;padding:26px 28px 30px}
.form-control,.form-select{min-height:46px;border-radius:12px}
.btn-rounded{min-height:46px;border-radius:12px;font-weight:600}
.topbar{background:linear-gradient(135deg,#0d6efd,#084298);color:#fff;box-shadow:0 8px 24px rgba(8,66,152,0.22)}
.topbar .nav-link{color:rgba(255,255,255,0.9);border-radius:10px;padding:6px 12px;font-size:14px;white-space:nowrap}
.topbar .nav-link:hover,.topbar .nav-link.active{color:#fff;background:rgba(255,255,255,0.16)}
.page-area{padding-top:24px;padding-bottom:48px}
.card-custom{border:none;border-radius:20px;box-shadow:0 10px 24px rgba(31,41,55,0.08);margin-bottom:20px}
.stat-card{border:none;border-radius:18px;box-shadow:0 8px 20px rgba(31,41,55,0.06);transition:transform 0.2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{width:44px;height:44px;border-radius:14px;display:flex;justify-content:center;align-items:center;font-size:20px;color:var(--bank-blue);background:var(--bank-light)}
.section-title{font-weight:700;margin-bottom:14px}
.page-section{animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.table thead th{white-space:nowrap;background:var(--bank-light);color:var(--bank-deep);font-size:14px}
.table tbody td{vertical-align:middle;font-size:14px}
.badge-status-ok{background:#d1e7dd;color:#0f5132}
.badge-status-fail{background:#f8d7da;color:#842029}
.hero-card{color:#fff;background:linear-gradient(135deg,#0d6efd,#3d8bfd);border:none;border-radius:20px;overflow:hidden}
.profile-row{padding:12px 0;border-bottom:1px solid #edf0f5}
.profile-row:last-child{border-bottom:none}
.nav-tabs .nav-link{font-size:14px;padding:8px 16px;border-radius:10px 10px 0 0}
@media(max-width:768px){.login-header,.login-body{padding-left:18px;padding-right:18px}.page-area{padding-top:16px}}
/* Dashboard charts */
.dash-bar-chart{display:flex;flex-direction:column;gap:10px}
.dash-bar-row{display:flex;align-items:center;gap:10px}
.dash-bar-label{width:50px;font-size:12px;text-align:right;font-weight:600;white-space:nowrap;color:var(--text-main)}
.dash-bar-track{flex:1;background:#e9ecef;border-radius:6px;height:22px;overflow:hidden}
.dash-bar-fill{height:100%;border-radius:6px;transition:width 0.7s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;color:#fff;font-weight:600;min-width:2px;white-space:nowrap}
.dash-donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.dash-donut{width:140px;height:140px;border-radius:50%;position:relative;flex-shrink:0;transition:transform 0.2s}
.dash-donut:hover{transform:scale(1.05)}
.dash-donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;text-align:center}
.dash-donut-center .total-count{font-size:22px;font-weight:800;color:var(--text-main)}
.dash-donut-center .total-label{font-size:11px;color:#6c757d}
.dash-legend{font-size:12px;display:flex;flex-direction:column;gap:5px}
.dash-legend-item{display:flex;align-items:center;gap:6px}
.dash-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dash-alert-card{border:none;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:0}
.dash-alert-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.dash-queue-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #edf0f5}
.dash-queue-row:last-child{border-bottom:none}
.dash-queue-badge{padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600}
.dash-card-mini{border:1px solid #edf0f5;border-radius:12px;padding:10px 14px;margin-bottom:8px;transition:box-shadow 0.15s}
.dash-card-mini:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.dash-card-mini:last-child{margin-bottom:0}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<section id="login_area" class="login-wrapper">
<div class="card login-card">
<div class="login-header">
<div class="brand-icon"><i class="fa-solid fa-building-columns"></i></div>
<h2 class="mb-1 fw-bold">银行智能管理系统</h2>
<p class="mb-0 opacity-75">v3.3 · C++ 10大模块完整Web实现 · 第十组</p>
</div>
<div class="login-body">
<div class="mb-3"><span class="badge rounded-pill bg-primary bg-opacity-10 text-primary px-3 py-2"><i class="fa-solid fa-shield-halved me-1"></i>多角色登录 · 全功能系统</span></div>
<form id="login_form" novalidate>
<div class="mb-3"><label class="form-label fw-semibold small">登录身份</label>
<select id="login_role" class="form-select"><option value="admin">管理员 (Admin)</option><option value="employee">职员 (Staff)</option><option value="customer" selected>客户 (Customer)</option></select></div>
<div class="mb-3"><label for="account_id" class="form-label fw-semibold small">账号</label>
<input type="text" id="account_id" class="form-control" placeholder="管理员E001 / 客户C000001 / 学号">
<div class="invalid-feedback">请输入有效账号。</div></div>
<div class="mb-3"><label for="password" class="form-label fw-semibold small">密码</label>
<input type="password" id="password" class="form-control" placeholder="请输入密码" maxlength="20"></div>
<div id="login_msg" class="alert py-2 px-3 small hidden" role="alert"></div>
<button type="submit" class="btn btn-primary btn-rounded w-100"><i class="fa-solid fa-right-to-bracket me-2"></i> 登录</button>
</form>
<p class="small text-secondary mb-0 mt-3">管理员: E001/000000 | 职员: E002/111111 | 客户: C000001/123456 | 学员: 学号/后4位</p>
</div></div>
</section>

<!-- ============ MAIN SYSTEM ============ -->
<section id="system_area" class="hidden">
<nav class="navbar navbar-expand-lg topbar">
<div class="container-fluid px-3 px-lg-4">
<a class="navbar-brand fw-bold" href="javascript:void(0);"><i class="fa-solid fa-building-columns me-2"></i>Bank v3.3</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="mainNav">
<ul class="navbar-nav me-auto" id="nav_tabs"></ul>
<div class="d-flex align-items-center gap-2">
<span id="top_user" class="small opacity-75"></span>
<button id="logout_btn" class="btn btn-outline-light btn-sm rounded-pill"><i class="fa-solid fa-arrow-right-from-bracket me-1"></i>登出</button>
</div></div></div>
</nav>

<main class="container page-area" id="page_container"></main>
</section>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
<script>
// ==================== GLOBAL STATE ====================
var currentUser = null;
var API_BASE = (function(){var h=window.location.hostname;if(h.includes('github.io')||h.includes('githubusercontent.com'))return'https://eraeve.pythonanywhere.com';return'';})();

function $(id){return document.getElementById(id);}
function esc(s){var d=document.createElement('div');d.textContent=(s===null||s===undefined)?'':String(s);return d.innerHTML;}
function fmt(v){return '¥'+Number(v||0).toFixed(2);}
function fmtNum(v){return Number(v||0).toFixed(2);}
function bad(s,t){t=t||'success';return '<span class="badge badge-status-'+(t==='success'?'ok':'fail')+'">'+s+'</span>';}
function showMsg(el,txt,type){
    type=type||'primary';el.textContent=txt;el.classList.remove('hidden');
    el.className='alert alert-'+type+' py-2 px-3 small';clearTimeout(el._t);el._t=setTimeout(function(){el.classList.add('hidden')},5000);
}
async function api(url,opts){
    opts=opts||{};var headers={'Content-Type':'application/json'};
    if(opts.body)opts.body=JSON.stringify(opts.body);
    try{var r=await fetch(API_BASE+url,{method:opts.method||'GET',headers:headers,body:opts.body,credentials:'include'});return await r.json();}
    catch(e){return{success:false,message:'网络错误: '+e.message}};
}

// ==================== NAV SYSTEM ====================
function buildNavTabs(){
    var tabs=[];
    if(!currentUser)return;
    var r=currentUser.role;
    if(r==='admin'){
        tabs=[{id:'dashboard',icon:'chart-pie',label:'仪表盘'},
              {id:'employee',icon:'user-tie',label:'职员管理'},
              {id:'customer',icon:'users',label:'客户管理'},
              {id:'card',icon:'credit-card',label:'银行卡管理'},
              {id:'trade',icon:'money-bill-transfer',label:'业务办理'},
              {id:'query',icon:'magnifying-glass',label:'业务查询'},
              {id:'queue',icon:'people-line',label:'排队管理'},
              {id:'branch',icon:'map-location-dot',label:'网点导航'},
              {id:'smart',icon:'brain',label:'智能管理'},
              {id:'identity',icon:'fingerprint',label:'身份核验'},
              {id:'about',icon:'circle-info',label:'关于'}];
    }else if(r==='employee'){
        tabs=[{id:'dashboard',icon:'chart-pie',label:'仪表盘'},
              {id:'customer',icon:'users',label:'客户管理'},
              {id:'card',icon:'credit-card',label:'银行卡管理'},
              {id:'trade',icon:'money-bill-transfer',label:'业务办理'},
              {id:'query',icon:'magnifying-glass',label:'业务查询'},
              {id:'queue',icon:'people-line',label:'排队管理'},
              {id:'about',icon:'circle-info',label:'关于'}];
    }else{
        tabs=[{id:'dashboard',icon:'chart-pie',label:'我的仪表盘'},
              {id:'myprofile',icon:'id-card',label:'个人信息'},
              {id:'mytrans',icon:'receipt',label:'交易记录'},
              {id:'mytrade',icon:'money-bill-transfer',label:'业务办理'},
              {id:'myinvest',icon:'chart-line',label:'投资顾问'},
              {id:'about',icon:'circle-info',label:'关于'}];
    }
    var html='';
    for(var i=0;i<tabs.length;i++){
        html+='<li class="nav-item"><a class="nav-link'+(i===0?' active':'')+'" href="javascript:void(0)" data-page="'+tabs[i].id+'">';
        html+='<i class="fa-solid fa-'+tabs[i].icon+' me-1"></i>'+tabs[i].label+'</a></li>';
    }
    $('nav_tabs').innerHTML=html;
    // Bind nav clicks
    var links=document.querySelectorAll('#nav_tabs .nav-link');
    links.forEach(function(lk){
        lk.addEventListener('click',function(){
            links.forEach(function(l){l.classList.remove('active')});
            this.classList.add('active');
            var pid=this.getAttribute('data-page');navigate(pid);
        });
    });
    navigate(tabs[0].id);
}

function navigate(pid){
    var html='';
    switch(pid){
    case 'dashboard':html=dashboardPage();break;
    case 'employee':html=employeePage();break;
    case 'customer':html=customerPage();break;
    case 'card':html=cardPage();break;
    case 'trade':html=tradePage();break;
    case 'query':html=queryPage();break;
    case 'queue':html=queuePage();break;
    case 'branch':html=branchPage();break;
    case 'smart':html=smartPage();break;
    case 'identity':html=identityPage();break;
    case 'myprofile':html=myProfilePage();break;
    case 'mycards':html=myCardsPage();break;
    case 'mytrans':html=myTransactionsPage();break;
    case 'mytrade':html=myTradePage();break;
    case 'myinvest':html=myInvestPage();break;
    case 'about':html=aboutPage();break;
    }
    $('page_container').innerHTML=html;
    // Trigger async loaders
    if(pid==='dashboard')loadDashboard();
    if(pid==='employee')loadEmployees();
    if(pid==='customer')loadCustomers();
    if(pid==='card')loadCards();
    if(pid==='trade')bindTradePage();
    if(pid==='query')bindQueryPage();
    if(pid==='queue'){loadQueueStatus();loadQueueHistory();}
    if(pid==='branch')loadBranches();
    if(pid==='smart')loadSmartPage();
    if(pid==='identity')bindIdentityPage();
    if(pid==='myprofile')loadMyProfile();
    if(pid==='mycards')loadMyCards();
    if(pid==='mytrans')loadMyTransactions();
    if(pid==='mytrade')bindMyTradePage();
    if(pid==='myinvest')loadMyInvest();
}

// ==================== LOGIN ====================
$('login_form').addEventListener('submit',async function(e){
    e.preventDefault();
    var role=$('login_role').value;
    var aid=$('account_id').value.trim();
    var pw=$('password').value.trim();
    if(!aid||!pw){showMsg($('login_msg'),'请输入账号和密码','warning');return;}
    var r=await api('/api/login',{method:'POST',body:{role:role,account_id:aid,password:pw}});
    if(!r.success){showMsg($('login_msg'),r.message,'danger');return;}
    currentUser=r.data;currentUser.role=role;
    $('login_area').classList.add('hidden');
    $('system_area').classList.remove('hidden');
    $('top_user').textContent='当前: '+r.data.name+' ('+(role==='admin'?'管理员':role==='employee'?'职员':'客户')+')';
    buildNavTabs();
});
$('logout_btn').addEventListener('click',function(){
    api('/api/logout',{method:'POST'});
    currentUser=null;$('system_area').classList.add('hidden');$('login_area').classList.remove('hidden');
    $('login_form').reset();$('page_container').innerHTML='';$('nav_tabs').innerHTML='';
});

// ==================== PAGE BUILDERS ====================
function dashboardPage(){
    var h='<h3 class="section-title"><i class="fa-solid fa-chart-pie text-primary me-2"></i>系统仪表盘</h3>';
    if(currentUser.role==='customer')h=myDashboardPage();
    else h+=dashboardGrid();
    return h;
}
function dashboardGrid(){
    var h='';
    // Row 1: Quick action buttons
    h+='<div class="row g-3 mb-3"><div class="col-12"><div class="d-flex flex-wrap gap-2">';
    h+='<button class="btn btn-outline-primary btn-sm rounded-pill" onclick="navigate(\'trade\')"><i class="fa-solid fa-money-bill-transfer me-1"></i>办理业务</button>';
    h+='<button class="btn btn-outline-success btn-sm rounded-pill" onclick="navigate(\'customer\')"><i class="fa-solid fa-user-plus me-1"></i>添加客户</button>';
    h+='<button class="btn btn-outline-warning btn-sm rounded-pill" onclick="navigate(\'queue\')"><i class="fa-solid fa-ticket me-1"></i>排队取号</button>';
    h+='<button class="btn btn-outline-info btn-sm rounded-pill" onclick="navigate(\'query\')"><i class="fa-solid fa-magnifying-glass me-1"></i>业务查询</button>';
    if(currentUser.role==='admin')h+='<button class="btn btn-outline-secondary btn-sm rounded-pill" onclick="navigate(\'smart\')"><i class="fa-solid fa-brain me-1"></i>智能分析</button>';
    h+='</div></div></div>';

    // Row 2: 6 stat cards
    h+='<div class="row g-3" id="dash_stats">';
    h+=statCard('职员数','employee_count','user-tie');
    h+=statCard('客户数','customer_count','users');
    h+=statCard('银行卡数','card_count','credit-card');
    h+=statCard('交易数','transaction_count','receipt');
    h+=statCard('交易总额','total_amount','sack-dollar');
    h+=statCard('VIP客户','vip_count','crown');
    h+='</div>';

    // Row 3: Recent Transactions + Queue Status
    h+='<div class="row g-3 mt-2">';
    h+='<div class="col-lg-8"><div class="card card-custom h-100"><div class="card-body p-3"><h5 class="fw-bold mb-2"><i class="fa-solid fa-clock-rotate-left text-primary me-2"></i>最近交易</h5><div class="table-responsive"><table class="table table-sm table-hover mb-0"><thead><tr><th>ID</th><th>类型</th><th>金额</th><th>对象</th><th>时间</th><th>状态</th></tr></thead><tbody id="dash_recent_txns"></tbody></table></div></div></div></div>';
    h+='<div class="col-lg-4"><div class="card card-custom h-100"><div class="card-body p-3"><h5 class="fw-bold mb-2"><i class="fa-solid fa-people-line text-warning me-2"></i>排队概览</h5><div id="dash_queue"></div></div></div></div>';
    h+='</div>';

    // Row 4: Bar Chart + Donut
    h+='<div class="row g-3 mt-2">';
    h+='<div class="col-lg-7"><div class="card card-custom h-100"><div class="card-body p-3"><h5 class="fw-bold mb-2"><i class="fa-solid fa-chart-simple text-success me-2"></i>交易类型分布</h5><div style="height:280px;position:relative"><canvas id="dash_txn_chart"></canvas></div></div></div></div>';
    h+='<div class="col-lg-5"><div class="card card-custom h-100"><div class="card-body p-3"><h5 class="fw-bold mb-2"><i class="fa-solid fa-chart-pie text-info me-2"></i>信用评级分布</h5><div style="height:280px;display:flex;align-items:center;justify-content:center"><canvas id="dash_credit_donut" style="max-width:240px;max-height:240px"></canvas></div></div></div></div>';
    h+='</div>';

    // Row 5: System Health Alerts
    h+='<div class="row g-3 mt-2" id="dash_alerts"></div>';

    return h;
}
function statCard(label,id,icon){
    return '<div class="col-md-4 col-lg-2"><div class="card stat-card"><div class="card-body p-3 text-center"><div class="stat-icon mx-auto mb-2"><i class="fa-solid fa-'+icon+'"></i></div><p class="text-secondary small mb-1">'+label+'</p><h4 class="fw-bold mb-0" id="'+id+'">-</h4></div></div></div>';
}

// --- Employee Page ---
function employeePage(){
    return '<h3 class="section-title"><i class="fa-solid fa-user-tie text-primary me-2"></i>银行职员管理</h3>'+
    '<div class="row g-3 mb-3"><div class="col-md-4"><button class="btn btn-primary w-100" onclick="showEmpModal()"><i class="fa-solid fa-plus me-1"></i>添加职员</button></div></div>'+
    '<div class="card card-custom"><div class="card-body p-3"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>编号</th><th>姓名</th><th>角色</th><th>部门</th><th>电话</th><th>邮箱</th><th>入职日期</th><th>状态</th><th>操作</th></tr></thead><tbody id="emp_tbody"></tbody></table></div></div></div>'+
    empFormModal();
}
function empFormModal(){
    return '<div class="modal fade" id="empModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="empModalTitle">添加职员</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="empForm">'+
    '<input type="hidden" id="emp_eid"><div class="row g-2">'+
    fld('编号','emp_id','text','E003')+fld('姓名','emp_name','text','')+
    fld('密码','emp_pw','password','123456')+fld('角色','emp_role','select','staff','<option value="admin">admin</option><option value="staff" selected>staff</option>')+
    fld('部门','emp_dept','text','')+fld('电话','emp_phone','text','')+
    fld('邮箱','emp_email','text','')+
    '</div></form></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="saveEmployee()">保存</button></div></div></div></div>';
}
function fld(label,id,type,placeholder,extra){extra=extra||'';
    return '<div class="col-md-6 mb-2"><label class="form-label small">'+label+'</label>'+(type==='select'?'<select class="form-select form-select-sm" id="'+id+'">'+extra+'</select>':'<input type="'+type+'" class="form-control form-control-sm" id="'+id+'" placeholder="'+placeholder+'">')+'</div>';
}

async function loadEmployees(){
    var r=await api('/api/employees');
    var tbody=$('emp_tbody');if(!tbody)return;
    tbody.innerHTML='';
    if(!r.data||r.data.length===0){tbody.innerHTML='<tr><td colspan="9" class="text-center py-3 text-secondary">暂无职员</td></tr>';return;}
    r.data.forEach(function(e){
        var tr=document.createElement('tr');
        tr.innerHTML='<td>'+esc(e.id)+'</td><td>'+esc(e.name)+'</td><td>'+esc(e.role)+'</td><td>'+esc(e.department)+'</td><td>'+esc(e.phone)+'</td><td>'+esc(e.email)+'</td><td>'+esc(e.hire_date)+'</td><td>'+(e.is_active?bad('在职'):bad('离职','warn'))+'</td>'+
        '<td><div class="btn-group btn-group-sm"><button class="btn btn-outline-primary btn-sm" onclick="editEmp(\''+esc(e.id)+'\')"><i class="fa-solid fa-pen"></i></button><button class="btn btn-outline-warning btn-sm" onclick="resetEmpPw(\''+esc(e.id)+'\')"><i class="fa-solid fa-key"></i></button>'+(e.role!=='admin'?'<button class="btn btn-outline-danger btn-sm" onclick="delEmp(\''+esc(e.id)+'\')"><i class="fa-solid fa-trash"></i></button>':'')+'</div></td>';
        tbody.appendChild(tr);
    });
}

    return '<div class="col-md-6"><div class="card card-custom h-100"><div class="card-body p-3"><h5 class="fw-bold mb-3"><i class="fa-solid fa-'+icon+' text-'+color+' me-2"></i>'+title+'</h5>'+

    // Bind for staff
    ['deposit','withdraw','transfer','loan','repay'].forEach(function(a){bindTradeBtn(a);});
    loadRecentTxns('recent_txn');
}
function bindMyTradePage(){
    ['deposit','withdraw','transfer'].forEach(function(a){bindTradeBtn(a);});
    loadRecentTxns('recent_txn');
}
function bindTradeBtn(action){
    var btnEl=$(action+'_amount');if(!btnEl)return;
}
async function doTrade(action){
    var amt=parseFloat($(action+'_amount').value);
    var msgEl=$(action+'_msg');
    if(isNaN(amt)||amt<=0){showMsg(msgEl,'请输入有效金额','warning');return;}
    var body={account_id:currentUser.id,amount:amt};
    if(action==='transfer'){
        var toId=$('transfer_to').value.trim();
        if(!toId){showMsg(msgEl,'请输入对方账号','warning');return;}
        body.from_account=currentUser.id;body.to_account=toId;
    }
    if(action==='loan'&&amt>500000){showMsg(msgEl,'单笔贷款不超过50万','warning');return;}
    if(action==='deposit'&&amt>10000000){showMsg(msgEl,'单笔存款不超过1000万','warning');return;}

    var url='/api/'+(action==='repay'?'repay':action);
    if(action==='transfer')url='/api/transfer';
    var r=await api(url,{method:'POST',body:body});
    showMsg(msgEl,r.message,r.success?'success':'danger');
    if(r.success){$(action+'_amount').value='';if(action==='transfer')$('transfer_to').value='';loadRecentTxns('recent_txn');loadDashboard();}
}
async function loadRecentTxns(tbid){
    var tbody=$(tbid);if(!tbody)return;
    var r=await api('/api/transactions?sort=time_desc');
    tbody.innerHTML='';
    var myTx=r.data?r.data.filter(function(tx){return tx.from_card===currentUser.id||tx.to_card===currentUser.id||tx.from===currentUser.id||tx.to===currentUser.id;}).slice(0,10):[];
    if(myTx.length===0){tbody.innerHTML='<tr><td colspan="6" class="text-center py-2 text-secondary">暂无交易</td></tr>';return;}
    myTx.forEach(function(tx){
        var icon;var tgt='-';
        if(tx.type==='存款'){icon='circle-down text-success';tgt='银行'}
        else if(tx.type==='取款'){icon='circle-up text-danger';tgt='银行'}
        else if(tx.type==='转账'){icon='right-left text-primary';tgt=(tx.from_card===currentUser.id||tx.from===currentUser.id)?tx.to_card||tx.to:tx.from_card||tx.from}
        else{icon='arrows-spin text-warning';tgt='银行'}
        var tr=document.createElement('tr');
        tr.innerHTML='<td><small>'+tx.id+'</small></td><td><i class="fa-solid fa-'+icon+' me-1"></i>'+tx.type+'</td><td class="fw-semibold">'+fmt(tx.amount)+'</td><td>'+tgt+'</td><td><small>'+tx.time+'</small></td><td>'+(tx.status==='成功'?bad('成功'):bad('失败','warn'))+'</td>';
        tbody.appendChild(tr);
    });
}

async function doQuery(){

    var r=await api('/api/transactions?'+params.join('&'));
    var tbody=$('q_result');$('q_result_title').textContent='查询结果 ('+r.count+' 条)';
    tbody.innerHTML='';if(!r.data||r.data.length===0){tbody.innerHTML='<tr><td colspan="7" class="text-center py-3 text-secondary">暂无数据</td></tr>';return;}

async function callNext(wtype){

    var comp=true;if(!rating||rating==='0'){comp=false;rating=5;}
    var r=await api('/api/queue/call',{method:'POST',body:{window_type:wtype,completed:comp,rating:parseInt(rating)||5}});
    if(r.success){loadQueueStatus();loadQueueHistory();alert('叫号: '+r.data.customer_name+' ('+r.data.id+')');}else alert(r.message);
}

async function loadBranches(){
    var r=await api('/api/branches');var tbody=$('br_tbody');if(!tbody)return;tbody.innerHTML='';
    if(!r.data||r.data.length===0){tbody.innerHTML='<tr><td colspan="7" class="text-center py-3 text-secondary">暂无网点</td></tr>';return;}
    r.data.forEach(function(b){tbody.innerHTML+='<tr><td>'+b.id+'</td><td>'+b.name+'</td><td>'+b.address+'</td><td>'+b.phone+'</td><td>'+b.hours+'</td><td>'+b.services+'</td><td><div class="btn-group btn-group-sm"><button class="btn btn-outline-primary btn-sm" onclick="editBranch(\''+b.id+'\')"><i class="fa-solid fa-pen"></i></button><button class="btn btn-outline-info btn-sm" onclick="reachableFrom(\''+b.id+'\')"><i class="fa-solid fa-location-crosshairs"></i></button><button class="btn btn-outline-danger btn-sm" onclick="delBranch(\''+b.id+'\')"><i class="fa-solid fa-trash"></i></button></div></td></tr>';});
    drawBranchMap(r.data);
}
function drawBranchMap(branches){
    var cvs=$('branch_canvas');if(!cvs)return;var ctx=cvs.getContext('2d');
    ctx.clearRect(0,0,600,400);
    ctx.fillStyle='#f0f4ff';ctx.fillRect(0,0,600,400);
    var minX=Math.min.apply(null,branches.map(function(b){return b.x}))-5;
    var maxX=Math.max.apply(null,branches.map(function(b){return b.x}))+5;
    var minY=Math.min.apply(null,branches.map(function(b){return b.y}))-5;
    var maxY=Math.max.apply(null,branches.map(function(b){return b.y}))+5;
    var sx=function(x){return 40+(x-minX)/((maxX-minX)||1)*520};
    var sy=function(y){return 350-(y-minY)/((maxY-minY)||1)*310};
    // Draw edges from graph
    api('/api/branches').then(function(rr){if(!rr.graph)return;
        for(var i=0;i<rr.graph.length;i++){for(var j=i+1;j<rr.graph[i].length;j++){if(rr.graph[i][j]>=0){
            ctx.beginPath();ctx.moveTo(sx(branches[i].x),sy(branches[i].y));ctx.lineTo(sx(branches[j].x),sy(branches[j].y));
            ctx.strokeStyle='#b0c4de';ctx.lineWidth=2;ctx.stroke();
            ctx.fillStyle='#6b7280';ctx.font='10px Arial';
            ctx.fillText(rr.graph[i][j]+'km',(sx(branches[i].x)+sx(branches[j].x))/2,(sy(branches[i].y)+sy(branches[j].y))/2-4);
    }}}});
    branches.forEach(function(b){ctx.beginPath();ctx.arc(sx(b.x),sy(b.y),10,0,2*Math.PI);ctx.fillStyle='#0d6efd';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#fff';ctx.font='11px bold Arial';ctx.textAlign='center';ctx.fillText(b.id,sx(b.x),sy(b.y)+4);ctx.fillStyle='#333';ctx.fillText(b.name,sx(b.x),sy(b.y)+24);});
}
async function saveBranch(){
    var eid=$('br_eid').value;var body={id:$('br_id').value,name:$('br_name').value,address:$('br_addr').value,phone:$('br_phone').value,hours:$('br_hours').value,services:$('br_svc').value,x:$('br_x').value,y:$('br_y').value};
    var r;if(eid)r=await api('/api/branches/'+eid,{method:'PUT',body:body});else r=await api('/api/branches',{method:'POST',body:body});
    if(r.success){var m=bootstrap.Modal.getInstance($('branchModal'));if(m)m.hide();loadBranches();}else alert(r.message);
}
async function editBranch(bid){
    var r=await api('/api/branches');var b=r.data.find(function(x){return x.id===bid});if(!b)return;
    $('branchModalTitle').textContent='修改网点';$('br_eid').value=b.id;$('br_id').value=b.id;$('br_name').value=b.name;$('br_addr').value=b.address;$('br_phone').value=b.phone;$('br_hours').value=b.hours;$('br_svc').value=b.services;$('br_x').value=b.x;$('br_y').value=b.y;
    new bootstrap.Modal($('branchModal')).show();
}
async function delBranch(bid){if(!confirm('确认删除?'))return;var r=await api('/api/branches/'+bid,{method:'DELETE'});alert(r.message);loadBranches();}

function showPathModal(){
    api('/api/branches').then(function(r){var sel=function(id){var h='';(r.data||[]).forEach(function(b){h+='<option value="'+b.id+'">'+b.id+' '+b.name+'</option>'});$(id).innerHTML=h;};sel('path_src');sel('path_dst');});new bootstrap.Modal($('pathModal')).show();

async function doPath(){
    var r=await api('/api/branches/'+$('path_src').value+'/path/'+$('path_dst').value);
    if(r.success){var h='<div class="alert alert-success py-2 small">总距离: <b>'+r.total_distance+' km</b><br>路径: ';r.path.forEach(function(p,i){h+=p.name+(i<r.path.length-1?' → ':'');});h+='</div>';$('path_result').innerHTML=h;}else{$('path_result').innerHTML='<div class="alert alert-danger py-2 small">'+r.message+'</div>';}

function showSetPathModal(){
    api('/api/branches').then(function(r){var sel=function(id){var h='';(r.data||[]).forEach(function(b){h+='<option value="'+b.id+'">'+b.id+' '+b.name+'</option>'});$(id).innerHTML=h;};sel('sp_src');sel('sp_dst');});new bootstrap.Modal($('setpathModal')).show();

async function doSetPath(){
    var r=await api('/api/branches/path',{method:'POST',body:{src:$('sp_src').value,dst:$('sp_dst').value,distance:parseFloat($('sp_dist').value)}});
    alert(r.message);if(r.success){var m=bootstrap.Modal.getInstance($('setpathModal'));if(m)m.hide();loadBranches();}

async function reachableFrom(bid){
    var r=await api('/api/branches/'+bid+'/reachable');if(!r.success){alert(r.message);return;}
    var h='从 '+r.from+' 出发:\n';
    r.reachable.forEach(function(x){h+=x.name+': '+(x.reachable?x.distance.toFixed(1)+' km':'不可达')+'\n';});
    alert(h);
}

async function calcMyInterest(type){
    var typeLabel=type==='monthly'?'月':'日';
    var el=$('my_interest');if(!el)return;
    el.innerHTML='<span class="text-primary"><i class="fa-solid fa-spinner fa-spin me-1"></i>计算中...</span>';
    var r=await api('/api/smart/interest?type='+type);
    if(!r.success){el.innerHTML='<span class="text-danger">'+r.message+'</span>';return;}
    // Get my card IDs from /api/cards filtered by customer_id
    var cardsR=await api('/api/cards');
    var myCardIds=[];
    if(cardsR.success&&cardsR.data){
        cardsR.data.forEach(function(c){if(c.customer_id===currentUser.id)myCardIds.push(c.id);});
    }
    if(myCardIds.length===0){
        // Fallback: show simplified interest based on currentUser balance
        var bal=currentUser.balance||0;
        var rate=0.35/100;
        var myInt=type==='monthly'?bal*rate/12:bal*rate/365;
        el.innerHTML='<b>'+typeLabel+'利息合计: '+fmtNum(myInt)+' 元</b><br><span class="text-secondary small">(基于简化账户，利率0.35%)</span>';
        return;
    }
    var h='';var total=0;var found=false;
    r.data.forEach(function(d){if(myCardIds.indexOf(d.card_id)>=0){h+=d.card_id+' ('+d.type+'): '+fmtNum(d.interest)+' 元<br>';total+=d.interest;found=true;}});
    if(!found)h='暂无利息数据<br>';
    h='<b>'+typeLabel+'利息合计: '+fmtNum(total)+' 元</b><br>'+h;
    el.innerHTML=h;
}

function renderCustCardList(cards){
    var el=$('cust_card_list');if(!el)return;
    if(!cards||cards.length===0){el.innerHTML='<p class="text-secondary small mb-0">暂无银行卡</p>';return;}
    var h='';cards.forEach(function(c){
        var typeIcon=c.type==='信用卡'?'credit-card text-warning':c.type==='储蓄卡'?'piggy-bank text-success':'wallet text-primary';
        var statusCls=c.status==='正常'?'badge-status-ok':'badge-status-fail';
        h+='<div class="dash-card-mini"><div class="d-flex justify-content-between align-items-center"><div><i class="fa-solid fa-'+typeIcon+' me-2"></i><span class="fw-semibold small">'+esc(c.id)+'</span><span class="badge '+statusCls+' ms-2" style="font-size:10px">'+esc(c.status)+'</span></div><span class="fw-bold">'+fmt(c.balance)+'</span></div><div class="small text-secondary mt-1">'+esc(c.type)+(c.type==='信用卡'?' | 额度:'+fmt(c.credit_limit):'')+' | 利率:'+c.interest_rate+'%</div></div>';
    });
    el.innerHTML=h;
}
function renderCustInvest(d){
    var el=$('cust_invest_preview');if(!el)return;
    if(!d.risk_preference){el.innerHTML='<p class="text-secondary mb-0">暂无投资建议</p>';return;}
    var colors={'股票型基金':'#dc3545','债券型基金':'#0d6efd','货币基金':'#6f42c1','定期存款':'#198754','活期备用':'#fd7e14'};
    var h='<div class="mb-3"><span class="fw-semibold">可用资金: </span><b>'+fmt(d.available_cash||d.total_balance)+'</b> ';
    h+='<span class="fw-semibold ms-3">风险偏好: </span><span class="badge bg-primary">'+d.risk_preference+'</span></div>';
    if(d.allocation){
        h+='<div class="dash-bar-chart">';
        var maxAmt=0;for(var k in d.allocation){if(d.allocation[k]>maxAmt)maxAmt=d.allocation[k];}
        for(var k in d.allocation){
            var pct=maxAmt>0?(d.allocation[k]/maxAmt*100):0;
            var c=colors[k]||'#6c757d';
            h+='<div class="dash-bar-row">';
            h+='<span class="dash-bar-label">'+k+'</span>';
            h+='<div class="dash-bar-track"><div class="dash-bar-fill" style="width:'+pct+'%;background:'+c+'">'+(pct>15?fmt(d.allocation[k]):'')+'</div></div>';
            h+='</div>';
        }
        h+='</div>';
    }
    h+='<p class="small text-secondary mt-2 mb-0"><i class="fa-solid fa-lightbulb me-1 text-warning"></i>提示: 切换至"投资顾问"页面获取详细分析</p>';
    el.innerHTML=h;
}
function quickAction(type){

async function loadDashboard(){
    if(currentUser.role==='customer'){loadCustomerDashboard();return;}
    var r=await api('/api/dashboard');if(!r.success)return;
    var d=r.data;
    // 6 stat cards
    var set=function(id,v){var el=$(id);if(el)el.textContent=v;};
    set('employee_count',d.employee_count);set('customer_count',d.customer_count);
    set('card_count',d.card_count);set('transaction_count',d.transaction_count);
    set('total_amount',fmt(d.total_transaction_amount));set('vip_count',d.vip_count);
    // Widgets
    renderDashRecentTxns(d.recent_txns);
    renderDashQueue(d);
    renderDashTxnChart(d.txn_summary);
    renderDashCreditDonut(d.rating_distribution);
    renderDashAlerts(d);
}
function renderDashRecentTxns(txns){
    var tbody=$('dash_recent_txns');if(!tbody)return;
    if(!txns||txns.length===0){tbody.innerHTML='<tr><td colspan="6" class="text-center py-2 text-secondary small">暂无交易</td></tr>';return;}
    tbody.innerHTML='';
    txns.forEach(function(tx){var tr=document.createElement('tr');
        var icon='receipt';if(tx.type==='存款')icon='circle-down text-success';else if(tx.type==='取款')icon='circle-up text-danger';else if(tx.type==='转账')icon='right-left text-primary';else if(tx.type==='贷款')icon='hand-holding-dollar text-warning';else if(tx.type==='还款')icon='rotate-left text-info';
        tr.innerHTML='<td><small>'+esc(tx.id)+'</small></td><td><i class="fa-solid fa-'+icon+' me-1 small"></i>'+esc(tx.type)+'</td><td class="fw-semibold">'+fmt(tx.amount)+'</td><td><small>'+esc(tx.to_card||tx.to||'-')+'</small></td><td><small>'+esc(tx.time)+'</small></td><td>'+(tx.status==='成功'?bad('成功'):bad('失败','warn'))+'</td>';
        tbody.appendChild(tr);
    });
}
function renderDashQueue(d){

var _dashCharts={};
function renderDashTxnChart(summary){
    var canvas=$('dash_txn_chart');if(!canvas)return;
    if(_dashCharts.txn){_dashCharts.txn.destroy();_dashCharts.txn=null;}
    if(!summary){canvas.parentElement.innerHTML='<p class="text-secondary small mb-0 text-center pt-5">暂无数据</p>';return;}
    var labels=[],counts=[],totals=[],bgColors=['#198754','#dc3545','#0d6efd','#fd7e14','#6f42c1'];
    var entries=[];for(var k in summary){entries.push({name:k,count:summary[k].count,total:summary[k].total});}
    entries.forEach(function(e){labels.push(e.name);counts.push(e.count);totals.push(e.total);});
    _dashCharts.txn=new Chart(canvas,{type:'bar',data:{labels:labels,datasets:[
        {label:'交易总额 (元)',data:totals,backgroundColor:bgColors,borderRadius:6,borderWidth:0}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return '总额: '+fmt(c.raw)+' | '+counts[c.dataIndex]+' 笔';}}}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return v>=10000?(v/10000).toFixed(1)+'万':v;}}}}}});
}
function renderDashCreditDonut(dist){
    var canvas=$('dash_credit_donut');if(!canvas)return;
    if(_dashCharts.donut){_dashCharts.donut.destroy();_dashCharts.donut=null;}
    if(!dist||Object.keys(dist).length===0){canvas.parentElement.innerHTML='<p class="text-secondary small mb-0 text-center pt-5">暂无评级数据</p>';return;}
    var bgColors={'AAA (极优)':'#198754','AA (优秀)':'#0d6efd','A (良好)':'#6f42c1','B (一般)':'#fd7e14','C (需关注)':'#dc3545'};
    var labels=[],data=[],colors=[];
    for(var k in dist){labels.push(k);data.push(dist[k]);colors.push(bgColors[k]||'#adb5bd');}
    _dashCharts.donut=new Chart(canvas,{type:'doughnut',data:{labels:labels,datasets:[{data:data,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{padding:15,usePointStyle:true,pointStyleWidth:10,font:{size:11}}}}}});
}
function renderDashAlerts(d){
    var el=$('dash_alerts');if(!el)return;

    h+='<div><div class="fw-semibold small">大额交易预警 (&gt;5万)</div><div class="fw-bold h5 mb-0">'+(d.anomaly_large_count||0)+' 笔</div></div>';
    h+='</div></div>';

    var freqIcon=d.anomaly_freq_count>0?'clock text-warning':'circle-check text-success';
    h+='<div class="col-md-6"><div class="dash-alert-card '+freqCls+'">';

    h+='</div></div>';
    el.innerHTML=h;
}
